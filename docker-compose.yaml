version: "3.7"

services:
  postgres:
    image: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    networks:
      - game-network
    environment:
      - POSTGRES_PASSWORD=root

  game-service:
    container_name: game-service
    ports:
      - "8080:8080"
    build: ./
    networks:
      - game-network

networks:
  game-network:
    driver: bridge